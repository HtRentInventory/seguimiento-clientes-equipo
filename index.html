function comprimir(file,maxPx,q){maxPx=maxPx||1600;q=q||0.72;return new Promise((res,rej)=>{
  if(!/^image\//.test(file.type)){const fr=new FileReader();fr.onload=()=>res({b64:String(fr.result).split(",")[1],mime:file.type||"application/octet-stream",nombre:file.name||"archivo"});fr.onerror=rej;fr.readAsDataURL(file);return;}

    let w=img.width,h=img.height;const s=Math.min(1,maxPx/Math.max(w,h));w=Math.round(w*s);h=Math.round(h*s);
    const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);

const MESES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const pad=n=>String(n).padStart(2,"0");
const parse=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const toISO=dt=>`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
const addDays=(s,n)=>{const dt=parse(s);dt.setDate(dt.getDate()+n);return toISO(dt);};
const largo=s=>{const dt=parse(s);return `${DIAS[dt.getDay()]} ${dt.getDate()} de ${MESES[dt.getMonth()]}`;};
const corto=s=>{if(!s)return"";const dt=parse(s);return `${dt.getDate()} ${MESES[dt.getMonth()].slice(0,3)}`;};
const hora=s=>{if(!s)return"";const dt=new Date(s);return `${pad(dt.getHours())}:${pad(dt.getMinutes())}`;};
const fechaHora=s=>{if(!s)return"";const dt=new Date(s);return `${dt.getDate()} ${MESES[dt.getMonth()].slice(0,3)} · ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;};

function estadoCompromiso(r,now){if(!r.compromiso||r.compromisoCumplido)return null;const d=new Date(r.compromiso).getTime()-now;if(d<0)return"vencido";if(d<=3600000)return"proximo";return"programado";}

function normFecha(v){if(v==null||v==="")return"";if(v instanceof Date)return toISO(v);if(typeof v==="number"){return toISO(new Date(Date.UTC(1899,11,30)+v*86400000));}const s=String(v).trim();let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return `${m[1]}-${pad(+m[2])}-${pad(+m[3])}`;m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return `${m[3]}-${pad(+m[2])}-${pad(+m[1])}`;const d=new Date(s);return isNaN(d)?"":toISO(d);}
function normFechaHora(v){if(v==null||v==="")return"";if(v instanceof Date)return `${toISO(v)}T${pad(v.getHours())}:${pad(v.getMinutes())}`;const s=String(v).trim();let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})[ T](\d{1,2}):(\d{2})/);if(m)return `${m[1]}-${pad(+m[2])}-${pad(+m[3])}T${pad(+m[4])}:${m[5]}`;const f=normFecha(s);return f?`${f}T09:00`:"";}
function parseEquipos(v){if(v==null)return[];const s=String(v).trim();if(!s)return[];return s.split(/\s*[;|\n]\s*|\s+y\s+/i).map(x=>x.trim()).filter(Boolean).map(p=>{const m=p.match(/^(\d+)\s*[x×]?\s+(.+)$/i);return m?{tipo:m[2].trim(),cantidad:parseInt(m[1])||1}:{tipo:p,cantidad:1};});}
function normTV(v){if(!v)return"";const q=quita(v);const hit=TIPOVENTA.find(o=>quita(o)===q);if(hit)return hit;if(q.includes("arrend"))return"Arrendamiento";if(q.includes("financ"))return"Financiamiento";if(q.includes("contado"))return"Contado";if(q.includes("renta"))return"Renta Pura";return"";}
function normTC(v){return quita(v).includes("recurrente")?"Cliente Recurrente":"Cliente Nuevo";}
function parseBitacora(v){if(v==null)return[];const s=String(v).trim();if(!s)return[];return s.split(/\s*;;\s*|\n/).map(x=>x.trim()).filter(Boolean).map((p,i)=>{const parts=p.split("|").map(z=>z.trim());return {id:i+1,fecha:normFecha(parts[0])||HOY,tipo:TIPOS.includes(parts[1])?parts[1]:"Llamada",contacto:CONTACTO.includes(parts[2])?parts[2]:"Contestó",resultado:parts.slice(3).join(" | ")||""};});}
function filasARegistros(filas){
  return filas.map((row,i)=>{
    const r={id:i+1,creado:HOY,ejecutivo:"",cliente:"",folioVenta:"",folioJJ:"",archivos:{},tipoCliente:"Cliente Nuevo",empresa:"",correo:"",telefono:"",niv:"",equipos:[],tipoVenta:"",plazo:"",adicionales:[],estatus:"Nueva",requisitos:{},queFalta:"",entregaProgramada:"",compromiso:"",compromisoCumplido:false,bitacora:[],notas:""};
    for(const k in row){const key=quita(k);const f=MAP[key];if(f){r[f]=row[k];}else if(REQ_MAP[key]!==undefined){const v=quita(row[k]);r.requisitos[REQ_MAP[key]]=VERDAD.has(v)?"recibido":NOAPLICA.has(v)?"na":"pendiente";}}
    r.tipoCliente=normTC(r._tcRaw); delete r._tcRaw;
    r.entregaProgramada=r.entregaProgramada?normFecha(r.entregaProgramada):"";
    r.compromiso=r.compromiso?normFechaHora(r.compromiso):"";
    r.equipos=parseEquipos(r._equipoRaw); delete r._equipoRaw;
    r.tipoVenta=normTV(r._tvRaw); delete r._tvRaw;
    r.plazo=r._plazoRaw?(parseInt(String(r._plazoRaw).replace(/\D/g,""))||""):""; delete r._plazoRaw;
    r.adicionales=r._adiRaw?String(r._adiRaw).split(",").map(x=>x.trim()).filter(Boolean):[]; delete r._adiRaw;
    r.bitacora=parseBitacora(r._bitRaw); delete r._bitRaw;
    r.requisitos={...reqPend(r.tipoCliente),...r.requisitos};
    ["ejecutivo","cliente","folioVenta","folioJJ","empresa","correo","telefono","niv","queFalta","notas"].forEach(k=>r[k]=String(r[k]||"").trim());
    {const raw=String(r.estatus||"").split(/[;,·]/).map(s=>s.trim()).filter(x=>ESTATUS.includes(x));r.estatuses=raw.length?raw:[ESTATUS[0]];r.estatus=principal(r.estatuses);}
    return r;
  }).filter(r=>r.cliente);
}

      <header className="border-b border-stone-200 bg-white">
        <div className="h-1 bg-amber-500"></div>
        <div className="mx-auto max-w-6xl px-5 py-4 flex items-center justify-between gap-4 flex-wrap"><div className="flex items-center gap-3"><div className="grid h-10 w-10 place-items-center rounded-lg bg-slate-900 text-amber-400"><Icon name="truck" size={20}/></div><div><h1 className="text-lg font-bold tracking-tight text-slate-900 leading-none">Seguimiento a Clientes</h1><p className="text-xs text-slate-500 mt-1 mono">SERVICIO A CLIENTES · HT RENT</p></div></div><button onClick={()=>setEditando("nuevo")} className="inline-flex items-center gap-2 rounded-lg bg-slate-900 px-3.5 py-2 text-sm font-semibold text-white hover:bg-slate-800"><Icon name="plus" size={16}/> Nuevo cliente</button></div>
      </header>

      <main className="mx-auto max-w-6xl px-5 py-5">
        {cargando && <div className="mb-4 rounded-lg bg-sky-50 text-sky-700 px-3 py-2 text-sm font-medium">Cargando datos de la nube…</div>}
        <div className="mb-5 rounded-xl border border-stone-200 bg-white p-3">
          <div className="flex flex-wrap items-center gap-2">
            <label className="inline-flex cursor-pointer items-center gap-1.5 rounded-lg border border-stone-300 bg-white px-3 py-1.5 text-sm font-semibold text-slate-700 hover:bg-stone-50"><Icon name="upload" size={15}/> Subir Excel / CSV<input type="file" accept=".xlsx,.xls,.csv" onChange={onArchivo} className="hidden"/></label>
            <button onClick={exportar} className="inline-flex items-center gap-1.5 rounded-lg border border-stone-300 bg-white px-3 py-1.5 text-sm font-semibold text-slate-700 hover:bg-stone-50"><Icon name="download" size={15}/> Exportar Excel</button>
            <button onClick={()=>{setRegistros(demo(Date.now()).map(normEst));setFEjec("Todos");setFCli("Todos");setBusca("");setFEstatus("");setAviso(null);}} className="inline-flex items-center gap-1.5 rounded-lg border border-stone-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-500 hover:bg-stone-50">Datos de ejemplo</button>
            <div className="flex flex-1 items-center gap-1.5 min-w-[240px]"><div className="flex flex-1 items-center gap-1.5 rounded-lg border border-stone-300 bg-white px-2.5"><Icon name="link" size={14} className="text-slate-400"/><input value={sheetUrl} onChange={e=>setSheetUrl(e.target.value)} placeholder="URL de Google Sheet…" className="flex-1 py-1.5 text-sm outline-none"/></div><button onClick={cargarSheet} className="rounded-lg bg-slate-900 px-3 py-1.5 text-sm font-semibold text-white hover:bg-slate-800">Cargar</button></div>
          </div>
          {aviso && <div className={`mt-2 rounded-md px-3 py-1.5 text-xs font-medium ${aviso.tipo==="ok"?"bg-emerald-50 text-emerald-700":aviso.tipo==="error"?"bg-red-50 text-red-700":"bg-sky-50 text-sky-700"}`}>{aviso.texto}</div>}
          {CLOUD && <div className="mt-2 flex flex-wrap items-center gap-2 border-t border-stone-100 pt-2"><span className="text-xs font-semibold text-slate-500">Nube:</span><button onClick={recargar} className="rounded-lg border border-stone-300 px-2.5 py-1 text-xs font-semibold text-slate-700 hover:bg-stone-50">Recargar</button>{sync && <span className="text-xs font-medium text-slate-600">{sync}</span>}</div>}
        </div>

        {urgentes.length>0 && <Banner urgentes={urgentes} now={now} onEdit={setEditando} onListo={marcarLlamada} hayVencidas={hayVencidas}/>}

        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-5">
          <Kpi icon="user" label={fEjec==="Todos"?"Clientes (total)":"Clientes · "+fEjec} valor={totalClientes} tono="text-slate-900"/>
          <Kpi icon="truck" label={fEjec==="Todos"?"Equipos · unidades":"Equipos · "+fEjec} valor={totalEquipos} tono="text-amber-600"/>
          <button onClick={()=>{setFEstatus(fEstatus==="Entregado"?"":"Entregado");setVista("clientes");}} className={`rounded-xl border bg-white px-4 py-3 text-left transition-all ${fEstatus==="Entregado"?"border-teal-400 ring-2 ring-teal-200":"border-stone-200 hover:bg-stone-50"}`}><div className="flex items-center gap-1.5 text-slate-400"><Icon name="check" size={16}/><span className="text-xs font-medium text-slate-500">{fEjec==="Todos"?"Entregados":"Entregados · "+fEjec}</span></div><p className="mt-1 text-2xl font-bold mono text-teal-600 leading-none">{entregEquipos}<span className="text-xs font-medium text-slate-400"> equipos</span></p><p className="text-[11px] text-slate-400 mt-0.5">{entregClientes} cliente(s)</p></button>
          <Kpi icon="alarm" label="Llamadas por hacer" valor={porMarcar} tono={hayVencidas?"text-red-600":"text-slate-900"}/>
          <Kpi icon="clip" label="Expedientes por completar" valor={expIncompletos} tono="text-indigo-600"/>
          <Kpi icon="calendar" label="Entregas próx. 7 días" valor={entregas7} tono="text-emerald-600"/>
        </div>
        <TableroEtapas counts={etapaCounts} total={porEjec.length} activo={fEstatus} onPick={est=>{setFEstatus(fEstatus===est?"":est);setVista("clientes");}}/>

        <div className="flex items-center justify-between gap-3 flex-wrap mb-4">
          <div className="inline-flex rounded-lg border border-stone-300 bg-white p-0.5"><Tab activo={vista==="clientes"} onClick={()=>setVista("clientes")}>Clientes</Tab><Tab activo={vista==="tablero"} onClick={()=>setVista("tablero")}>Tablero</Tab><Tab activo={vista==="lista"} onClick={()=>setVista("lista")}>Lista</Tab><Tab activo={vista==="dia"} onClick={()=>setVista("dia")}>Día</Tab></div>
          <div className="flex items-center gap-2 flex-wrap">
            <div className="flex items-center gap-1.5 rounded-lg border border-stone-300 bg-white px-2.5"><Icon name="search" size={14} className="text-slate-400"/><input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar cliente, NIV, folio, tel…" className="py-1.5 text-sm outline-none w-48"/></div>
            <Select value={fEjec} onChange={cambiarEjec} options={["Todos",...ejecutivos]} prefijo="Ejecutivo"/>
            <Select value={fCli} onChange={setFCli} options={clientesOpc} prefijo="Cliente"/>
            <Select value={orden} onChange={setOrden} options={["Predeterminado","Más días en proceso","Menos días en proceso"]} prefijo="Orden"/>
          </div>
        </div>

        {fEstatus && <div className="mb-3"><span className="inline-flex items-center gap-2 rounded-lg bg-slate-100 px-3 py-1.5 text-xs font-semibold text-slate-700">Etapa: {fEstatus} <button onClick={()=>setFEstatus("")} className="text-slate-500 hover:text-red-500"><Icon name="x" size={13}/></button></span></div>}
        {vista==="clientes" && (mostrados.length?<div className="grid gap-3 sm:grid-cols-2">{mostrados.map(r=><Tarjeta key={r.id} r={r} now={now} onEdit={setEditando} onListo={marcarLlamada}/>)}</div>:<Vacio texto="No hay clientes con los filtros actuales."/>)}
        {vista==="tablero" && <VistaTablero registros={visibles} now={now} onEdit={setEditando}/>}
        {vista==="lista" && <VistaLista registros={visibles} now={now} onEdit={setEditando}/>}
        {vista==="dia" && <AgendaDia dia={dia} setDia={setDia} agenda={agenda} onEdit={setEditando}/>}
      </main>

      {editando && <Modal inicial={editando==="nuevo"?null:editando} fEjec={fEjec} ejecutivos={ejecutivos} cliPorEjec={cliPorEjec} onClose={()=>setEditando(null)} onSave={guardar}/>}
    </div>
  );
}

/* ---------- Banner ---------- */
function Banner({urgentes,now,onEdit,onListo,hayVencidas}){
  const tono=hayVencidas?"border-red-300 bg-red-50":"border-amber-300 bg-amber-50";
  return (<div className={`mb-4 rounded-xl border ${tono} px-4 py-3`}><div className="flex items-center gap-2 mb-2"><Icon name="bell" size={16} className={hayVencidas?"text-red-600":"text-amber-600"}/><p className={`text-sm font-bold ${hayVencidas?"text-red-700":"text-amber-800"}`}>{urgentes.length} {urgentes.length===1?"llamada":"llamadas"} por atender</p></div><div className="flex flex-wrap gap-2">{urgentes.map(r=>{const venc=estadoCompromiso(r,now)==="vencido";return (<div key={r.id} className={`inline-flex items-center gap-2 rounded-lg border bg-white px-2.5 py-1.5 ${venc?"border-red-300":"border-amber-300"}`}><span className={`h-2 w-2 rounded-full ${venc?"bg-red-500":"bg-amber-500"}`}></span><button onClick={()=>onEdit(r)} className="text-sm font-semibold text-slate-800 hover:underline">{r.cliente}</button>{r.telefono && <a href={`tel:${r.telefono.replace(/[^0-9+]/g,"")}`} className="text-xs text-slate-500 hover:text-slate-800 mono">{r.telefono}</a>}<span className="text-xs text-slate-500 mono">{venc?"venció":""} {hora(r.compromiso)}</span><button onClick={()=>onListo(r.id)} title="Marcar realizada" className="grid h-5 w-5 place-items-center rounded text-emerald-600 hover:bg-emerald-50"><Icon name="check" size={14}/></button></div>);})}</div></div>);
}

/* ---------- Agenda Día ---------- */
function AgendaDia({dia,setDia,agenda,onEdit}){
  return (<div>
    <div className="flex items-center justify-between mb-4 rounded-lg border border-stone-200 bg-white px-3 py-2.5"><button onClick={()=>setDia(addDays(dia,-1))} className="grid h-8 w-8 place-items-center rounded-md hover:bg-stone-100 text-slate-600"><Icon name="left" size={18}/></button><div className="text-center"><p className="text-sm font-bold capitalize text-slate-900">{largo(dia)}</p><button onClick={()=>setDia(HOY)} className="text-xs text-amber-600 hover:underline mono">ir a hoy</button></div><button onClick={()=>setDia(addDays(dia,1))} className="grid h-8 w-8 place-items-center rounded-md hover:bg-stone-100 text-slate-600"><Icon name="right" size={18}/></button></div>
    {agenda.length===0?<Vacio texto="Sin interacciones registradas este día."/>:<div className="space-y-2">{agenda.map(({r,be})=>(<button key={r.id+"-"+be.id} onClick={()=>onEdit(r)} className="flex w-full items-start gap-3 rounded-lg border border-stone-200 bg-white p-3 text-left hover:shadow-sm"><TipoTag tipo={be.tipo}/><div className="min-w-0 flex-1"><div className="flex items-center gap-2"><p className="font-semibold text-slate-900 truncate">{r.cliente}</p><ContactoTag contacto={be.contacto} compacto/></div><p className="text-xs text-slate-500">{r.ejecutivo}</p>{be.resultado && <p className="mt-1 text-sm text-slate-600">{be.resultado}</p>}</div><Badge estatus={r.estatus}/></button>))}</div>}
  </div>);
}

/* ---------- Tablero ---------- */
function VistaTablero({registros,now,onEdit}){
  return (<div className="flex gap-3 overflow-x-auto pb-2">{ESTATUS.map(est=>{const items=registros.filter(r=>r.estatus===est);return (<div key={est} className="min-w-[200px] flex-1"><div className="flex items-center gap-2 mb-2 px-1"><span className={`h-2 w-2 rounded-full ${ESTATUS_COLOR[est].spine}`}></span><h3 className="text-xs font-bold uppercase tracking-wide text-slate-600 leading-tight">{est}</h3><span className="ml-auto text-xs text-slate-400 mono">{items.length}</span></div><div className="space-y-2">{items.map(r=><TarjetaMini key={r.id} r={r} now={now} onEdit={onEdit}/>)}{items.length===0 && <div className="rounded-lg border border-dashed border-stone-300 py-6 text-center text-xs text-slate-400">—</div>}</div></div>);})}</div>);
}

/* ---------- Lista ---------- */
function VistaLista({registros,now,onEdit}){
  const orden=[...registros].sort((a,b)=>a.cliente.localeCompare(b.cliente));
  if(!orden.length)return <Vacio texto="No hay clientes con los filtros actuales."/>;
  return (<div className="overflow-x-auto rounded-lg border border-stone-200 bg-white"><table className="w-full text-sm"><thead><tr className="border-b border-stone-200 text-left text-xs uppercase tracking-wide text-slate-500"><th className="px-3 py-2.5 font-semibold">Cliente / Ejecutivo</th><th className="px-3 py-2.5 font-semibold">Tipo</th><th className="px-3 py-2.5 font-semibold">Equipo</th><th className="px-3 py-2.5 font-semibold">Estatus</th><th className="px-3 py-2.5 font-semibold">Expediente</th><th className="px-3 py-2.5 font-semibold">Últ. interacción</th><th className="px-3 py-2.5 font-semibold">Entrega</th><th className="px-3 py-2.5"></th></tr></thead><tbody>{orden.map(r=>{const st=reqStats(r);const u=ultInter(r);return (<tr key={r.id} className="border-b border-stone-100 last:border-0 hover:bg-stone-50"><td className="px-3 py-2.5"><p className="font-semibold text-slate-900">{r.cliente}</p><p className="text-xs text-slate-500">{r.ejecutivo}{r.telefono?" · "+r.telefono:""}</p></td><td className="px-3 py-2.5 text-xs text-slate-600 whitespace-nowrap">{r.tipoCliente==="Cliente Recurrente"?"Recurrente":"Nuevo"}</td><td className="px-3 py-2.5 text-slate-700 max-w-[170px]">{equiposTxt(r)||<span className="text-slate-300">—</span>}</td><td className="px-3 py-2.5"><Badge estatus={r.estatus}/></td><td className="px-3 py-2.5 whitespace-nowrap">{st.completo?<span className="inline-flex items-center gap-1 text-xs font-semibold text-emerald-600"><Icon name="check" size={12}/>Completo</span>:<span className="text-xs font-medium text-indigo-600 mono">{st.recibido}/{st.aplicables}</span>}</td><td className="px-3 py-2.5 whitespace-nowrap text-xs text-slate-500">{u?`${corto(u.fecha)} · ${u.contacto}`:<span className="text-slate-300">—</span>}</td><td className="px-3 py-2.5 whitespace-nowrap">{r.entregaProgramada?<span className="inline-flex items-center gap-1 text-emerald-700"><Icon name="truck" size={13}/>{corto(r.entregaProgramada)}</span>:<span className="text-slate-300">—</span>}</td><td className="px-3 py-2.5"><button onClick={()=>onEdit(r)} className="text-slate-400 hover:text-slate-700"><Icon name="pencil" size={15}/></button></td></tr>);})}</tbody></table></div>);
}

/* ---------- Expediente bar ---------- */
function primeraInter(r){const b=(r.bitacora||[]).filter(x=>x.fecha).slice().sort((a,b)=>(a.fecha||"").localeCompare(b.fecha||""));return b[0]||null;}
function diasEnGestion(r){const p=primeraInter(r);if(!p)return null;return Math.round((parse(HOY)-parse(p.fecha))/86400000);}
function Cronometro({r}){
  if(["Entregado","Cancelado"].includes(r.estatus))return null;
  const d=diasEnGestion(r); if(d===null)return null;
  const pct=Math.min(100,Math.max(0,d/60*100)); const vencido=d>60;
  const col=d<=20?"text-emerald-600":d<=40?"text-amber-600":d<=60?"text-orange-600":"text-red-600";
  return (<div className="mt-2">
    <div className="flex items-center justify-between text-xs mb-1"><span className="font-semibold text-slate-600 inline-flex items-center gap-1"><Icon name="clock" size={12}/> Gestión (60 días)</span><span className={`mono font-bold ${col}`}>{vencido?`Vencido +${d-60}d`:`Día ${d} de 60`}</span></div>
    <div className="relative h-2 w-full rounded-full overflow-hidden" style={{background:"linear-gradient(to right,#22c55e 0%,#22c55e 28%,#fbbf24 40%,#f59e0b 60%,#f97316 78%,#ef4444 100%)"}}><div className="absolute -top-0.5 h-3 w-1 rounded bg-slate-900" style={{left:`calc(${pct}% - 2px)`}}></div></div>
    <p className="mt-1 text-[11px] text-slate-400">{vencido?"Fuera del plazo de 60 días":`Quedan ${60-d} días para entregar`}</p>
  </div>);
}
function ReqBarra({r}){
  const st=reqStats(r);
  if(st.completo)return <div className="mt-2 inline-flex items-center gap-1.5 rounded-md border border-emerald-200 bg-emerald-50 px-2 py-1 text-xs font-semibold text-emerald-700"><Icon name="clip" size={12}/> Expediente completo</div>;
  const pct=st.aplicables?Math.round(st.recibido/st.aplicables*100):0;
  return (<div className="mt-2"><div className="flex items-center justify-between text-xs mb-1"><span className="font-semibold text-slate-600 inline-flex items-center gap-1"><Icon name="clip" size={12}/> Expediente</span><span className="mono text-indigo-600 font-semibold">{st.recibido}/{st.aplicables}</span></div><div className="h-1.5 w-full rounded-full bg-stone-200 overflow-hidden"><div className="h-full bg-indigo-500" style={{width:pct+"%"}}></div></div>{st.faltan.length>0 && <p className="mt-1 text-xs text-slate-500 truncate">Faltan: {st.faltan.slice(0,3).join(", ")}{st.faltan.length>3?` +${st.faltan.length-3}`:""}</p>}</div>);
}

/* ---------- Tags ---------- */
function TipoTag({tipo}){return <span className="rounded border border-stone-200 bg-stone-50 px-1.5 py-0.5 text-[10px] font-bold tracking-wide text-slate-500 mono shrink-0">{TIPO_ABBR[tipo]||tipo}</span>;}
function EmpresaTag({empresa}){return empresa?<span className="rounded bg-slate-800 px-1.5 py-0.5 text-[10px] font-bold text-white mono">{empresa}</span>:null;}
function ClienteTipoTag({tc}){const rec=tc==="Cliente Recurrente";return <span className={`inline-flex items-center gap-0.5 rounded px-1.5 py-0.5 text-[10px] font-bold ${rec?"bg-teal-100 text-teal-700":"bg-sky-100 text-sky-700"}`}><Icon name="user" size={9}/>{rec?"RECURRENTE":"NUEVO"}</span>;}

/* ---------- Tarjeta ---------- */
function Tarjeta({r,now,onEdit,onListo}){
  const c=ESTATUS_COLOR[r.estatus];const e=estadoCompromiso(r,now);const eqt=equiposTxt(r);const u=ultInter(r);const nb=(r.bitacora||[]).length;
  const ring=e==="vencido"?"ring-2 ring-red-400 border-red-300":e==="proximo"?"ring-2 ring-amber-400 border-amber-300":"border-stone-200";
  return (<div className={`group relative w-full overflow-hidden rounded-xl border bg-white transition-shadow hover:shadow-md ${ring}`}><span className={`absolute inset-y-0 left-0 w-1.5 ${c.spine}`}></span>
    <button onClick={()=>onEdit(r)} className="block w-full p-4 pl-5 text-left">
      <div className="flex items-start justify-between gap-2"><div className="flex items-center gap-2 min-w-0">{e && <span className={`h-2.5 w-2.5 rounded-full shrink-0 ${e==="vencido"?"bg-red-500":e==="proximo"?"bg-amber-500":"bg-sky-400"}`}></span>}<div className="min-w-0"><div className="flex items-center gap-1.5"><p className={`font-bold leading-tight truncate ${e==="vencido"?"text-red-700":e==="proximo"?"text-amber-800":"text-slate-900"}`}>{r.cliente}</p></div><p className="text-xs text-slate-500 mt-0.5">{r.ejecutivo}</p>{(r.folioVenta||r.folioJJ)&&<p className="text-[10px] text-slate-400 mono mt-0.5">{r.folioVenta?`V: ${r.folioVenta}`:""}{r.folioVenta&&r.folioJJ?"  ·  ":""}{r.folioJJ?`JJ: ${r.folioJJ}`:""}</p>}</div></div><div className="flex flex-col items-end gap-1 shrink-0"><Badges r={r}/><div className="flex items-center gap-1"><ClienteTipoTag tc={r.tipoCliente}/><EmpresaTag empresa={r.empresa}/></div></div></div>
      {eqt && <p className="mt-2 text-xs font-medium text-slate-600 inline-flex items-start gap-1"><Icon name="truck" size={12} className="text-slate-400 mt-0.5 shrink-0"/><span>{eqt}</span></p>}
      {r.niv && <p className="mt-1 text-xs text-slate-500 mono truncate">NIV: {String(r.niv).split(/[\n,]+/).map(x=>x.trim()).filter(Boolean).join(", ")}</p>}{r.tipoVenta && <p className="mt-1 text-xs text-slate-500"><span className="font-semibold text-slate-600">{r.tipoVenta}</span>{r.plazo?` · ${r.plazo} meses`:""}</p>}
      <div className="mt-2 rounded-md bg-stone-50 border border-stone-100 px-2 py-1.5 text-xs">{u?(<div className="flex items-start gap-1.5"><Icon name="history" size={12} className="text-slate-400 mt-0.5 shrink-0"/><div className="min-w-0"><span className="font-semibold text-slate-600">{corto(u.fecha)} · {u.tipo} · </span><ContactoTag contacto={u.contacto} inline/>{u.resultado && <span className="text-slate-600"> — {u.resultado}</span>}<span className="text-slate-400 mono"> · {nb} {nb===1?"interacción":"interacciones"}</span></div></div>):<span className="text-slate-400 inline-flex items-center gap-1"><Icon name="history" size={12}/> Sin interacciones aún</span>}</div>
      {r.adicionales&&r.adicionales.length>0 && <div className="mt-2 flex flex-wrap gap-1">{r.adicionales.map(a=><span key={a} className="inline-flex items-center gap-0.5 rounded bg-stone-100 px-1.5 py-0.5 text-[10px] font-medium text-slate-500"><Icon name="tag" size={9}/>{a}</span>)}</div>}
      <Cronometro r={r}/><ReqBarra r={r}/>{numArchivos(r)>0&&<p className="mt-1 text-[11px] font-semibold text-emerald-600">{numArchivos(r)} archivo(s) en el expediente</p>}
      {r.queFalta && <div className="mt-2 flex items-start gap-1.5 rounded-md bg-amber-50 px-2 py-1.5 text-xs text-amber-800"><Icon name="alert" size={13} className="mt-0.5 shrink-0"/><span><span className="font-semibold">Pendiente:</span> {r.queFalta}</span></div>}
      {r.entregaProgramada && (r.estatus==="Entregado"?<div className="mt-2 inline-flex items-center gap-1.5 rounded-md border border-teal-300 bg-teal-50 px-2.5 py-1.5 text-xs font-bold text-teal-700"><Icon name="check" size={14}/> Entregado el {largo(r.entregaProgramada)}</div>:<div className="mt-2 inline-flex items-center gap-1.5 rounded-md border border-emerald-200 bg-emerald-50 px-2.5 py-1.5 text-xs font-semibold text-emerald-700"><Icon name="truck" size={14}/> Entrega programada: {largo(r.entregaProgramada)}</div>)}
    </button>
    <div className="flex items-center gap-3 border-t border-stone-100 px-4 py-1.5 text-xs text-slate-500">{r.telefono && <a href={`tel:${r.telefono.replace(/[^0-9+]/g,"")}`} className="inline-flex items-center gap-1 hover:text-slate-800"><Icon name="phone" size={12}/>{r.telefono}</a>}{r.correo && <a href={`mailto:${r.correo}`} className="inline-flex items-center gap-1 hover:text-slate-800 truncate"><Icon name="mail" size={12}/>{r.correo}</a>}<button onClick={()=>onEdit(r)} className="ml-auto inline-flex items-center gap-1 font-semibold text-slate-600 hover:text-slate-900"><Icon name="plus" size={12}/> Interacción</button></div>
    {e && (<div className={`flex items-center justify-between gap-2 border-t px-4 py-2 ${e==="vencido"?"border-red-200 bg-red-50":e==="proximo"?"border-amber-200 bg-amber-50":"border-sky-100 bg-sky-50"}`}><span className={`inline-flex items-center gap-1.5 text-xs font-semibold ${e==="vencido"?"text-red-700":e==="proximo"?"text-amber-700":"text-sky-700"}`}><Icon name="alarm" size={13}/>{e==="vencido"?`Llamada vencida · era ${fechaHora(r.compromiso)}`:e==="proximo"?`Llamar pronto · ${hora(r.compromiso)}`:`Llamada agendada · ${fechaHora(r.compromiso)}`}</span><button onClick={()=>onListo(r.id)} className="inline-flex items-center gap-1 rounded-md border border-stone-300 bg-white px-2 py-0.5 text-xs font-semibold text-slate-600 hover:bg-stone-50"><Icon name="check" size={12}/> Listo</button></div>)}
  </div>);

function TarjetaMini({r,now,onEdit}){

  return (<button onClick={()=>onEdit(r)} className={`w-full rounded-lg border bg-white p-2.5 text-left hover:shadow-sm ${e==="vencido"?"border-red-300":e==="proximo"?"border-amber-300":"border-stone-200 hover:border-slate-300"}`}><div className="flex items-center gap-1.5">{e && <span className={`h-2 w-2 rounded-full ${e==="vencido"?"bg-red-500":e==="proximo"?"bg-amber-500":"bg-sky-400"}`}></span>}<p className="text-sm font-semibold text-slate-900 leading-tight truncate">{r.cliente}</p></div>{eqt && <p className="mt-0.5 text-xs text-slate-500 truncate">{eqt}</p>}{u && <p className="mt-1 text-xs text-slate-500 truncate">{corto(u.fecha)} · {u.tipo} · {u.contacto}</p>}<div className="mt-1.5 flex items-center justify-between text-xs mono">{st.completo?<span className="text-emerald-600 font-semibold">Exp. completo</span>:<span className="text-indigo-600">Exp. {st.recibido}/{st.aplicables}</span>}{r.entregaProgramada && <span className="inline-flex items-center gap-0.5 text-emerald-600"><Icon name="truck" size={11}/>{corto(r.entregaProgramada)}</span>}</div></button>);
}

/* ---------- Modal ---------- */
function Modal({inicial,fEjec,ejecutivos,cliPorEjec,onClose,onSave}){
  const base=inicial||{creado:HOY,ejecutivo:fEjec!=="Todos"?fEjec:(ejecutivos[0]||""),cliente:"",folioVenta:"",folioJJ:"",archivos:{},tipoCliente:"Cliente Nuevo",empresa:"",correo:"",telefono:"",niv:"",equipos:[{tipo:"",cantidad:1}],tipoVenta:"",plazo:"",adicionales:[],estatuses:["Presentación con Cliente"],estatus:"Presentación con Cliente",requisitos:reqPend("Cliente Nuevo"),queFalta:"",entregaProgramada:"",compromiso:"",compromisoCumplido:false,bitacora:[],notas:""};
  const [f,setF]=useState({...base,niv:base.niv||"",folioVenta:base.folioVenta||"",folioJJ:base.folioJJ||"",estatuses:[...(base.estatuses||(base.estatus?[base.estatus]:[ESTATUS[0]]))],equipos:(base.equipos&&base.equipos.length)?base.equipos.map(e=>({...e})):[{tipo:"",cantidad:1}],adicionales:[...(base.adicionales||[])],requisitos:{...reqPend(base.tipoCliente||"Cliente Nuevo"),...(base.requisitos||{})},archivos:JSON.parse(JSON.stringify(base.archivos||{})),bitacora:[...(base.bitacora||[])]});
  const [subiendo,setSubiendo]=useState("");
  async function subirArchivo(docKey,file){
    if(!CLOUD){alert("Para subir archivos primero conecta la nube (API_URL y API_TOKEN).");return;}
    if(!String(f.cliente||"").trim()){alert("Captura primero el nombre del cliente; los archivos se guardan en su carpeta.");return;}
    try{setSubiendo(docKey);const c=await comprimir(file);const j=await apiUpload(String(f.cliente).trim(),docKey,c.nombre,c.mime,c.b64);
      setF(p=>({...p,archivos:{...(p.archivos||{}),[docKey]:[...(((p.archivos||{})[docKey])||[]),{id:j.id,url:j.url,nombre:c.nombre,fecha:HOY}]}}));setSubiendo("");
    }catch(err){setSubiendo("");alert("No se pudo subir: "+err.message);}
  }
  function quitarArchivo(docKey,idx){if(!window.confirm("¿Quitar este archivo del expediente?\n(El archivo permanece en tu Google Drive.)"))return;setF(p=>{const arr=[...(((p.archivos||{})[docKey])||[])];arr.splice(idx,1);return{...p,archivos:{...(p.archivos||{}),[docKey]:arr}};});}
  const [nb,setNb]=useState({fecha:HOY,tipo:"Llamada",contacto:"Contestó",resultado:""});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleEst=est=>setF(p=>{const cur=p.estatuses||[];const has=cur.includes(est);const es=has?cur.filter(x=>x!==est):[...cur,est];return{...p,estatuses:es,estatus:principal(es)};});
  const setTC=v=>setF(p=>({...p,tipoCliente:v,requisitos:{...reqPend(v),...p.requisitos}}));
  const ciclaReq=k=>setF(p=>{const c=p.requisitos[k]||"pendiente";const n=c==="pendiente"?"recibido":c==="recibido"?"na":"pendiente";return {...p,requisitos:{...p.requisitos,[k]:n}};});
  const setEq=(i,campo,val)=>setF(p=>({...p,equipos:p.equipos.map((e,j)=>j===i?{...e,[campo]:campo==="cantidad"?(val===""?"":Math.max(1,parseInt(val)||1)):val}:e)}));
  const addEq=()=>setF(p=>({...p,equipos:[...p.equipos,{tipo:"",cantidad:1}]}));
  const delEq=i=>setF(p=>({...p,equipos:p.equipos.filter((_,j)=>j!==i)}));
  const setTV=v=>setF(p=>({...p,tipoVenta:v,plazo:(PLAZOS[v]||[]).includes(p.plazo)?p.plazo:""}));
  const toggleAdi=a=>setF(p=>({...p,adicionales:p.adicionales.includes(a)?p.adicionales.filter(x=>x!==a):[...p.adicionales,a]}));
  const addBit=()=>{if(!nb.resultado.trim()&&!nb.tipo)return;setF(p=>({...p,bitacora:[...p.bitacora,{id:Math.max(0,...p.bitacora.map(x=>x.id||0))+1,...nb,resultado:nb.resultado.trim()}]}));setNb({fecha:HOY,tipo:nb.tipo,contacto:"Contestó",resultado:""});};
  const delBit=id=>setF(p=>({...p,bitacora:p.bitacora.filter(x=>x.id!==id)}));

  const clientesSug=cliPorEjec[f.ejecutivo]||[];
  const st=reqStats(f);const valido=f.cliente;const plazosDisp=PLAZOS[f.tipoVenta]||[];
  const bitOrd=[...f.bitacora].sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||"")||(b.id||0)-(a.id||0));
  const inp="w-full rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-100";
  const guardarLimpio=()=>onSave({...f,equipos:f.equipos.filter(e=>e.tipo.trim()).map(e=>({tipo:e.tipo.trim(),cantidad:Number(e.cantidad)||1}))});

  return (<div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/40 sm:p-4" onClick={onClose}>
    <div className="w-full sm:max-w-lg max-h-[92vh] overflow-y-auto rounded-t-2xl sm:rounded-2xl bg-white shadow-xl" onClick={e=>e.stopPropagation()}>
      <div className="sticky top-0 z-10 flex items-center justify-between border-b border-stone-200 bg-white px-5 py-3.5 rounded-t-2xl"><h2 className="font-bold text-slate-900">{inicial?"Ficha del cliente":"Nuevo cliente"}</h2><button onClick={onClose} className="grid h-8 w-8 place-items-center rounded-md hover:bg-stone-100 text-slate-500"><Icon name="x" size={18}/></button></div>
      <datalist id="dl-ejec">{ejecutivos.map(x=><option key={x} value={x}/>)}</datalist>
      <datalist id="dl-cli">{clientesSug.map(x=><option key={x} value={x}/>)}</datalist>
      <datalist id="dl-emp">{EMPRESAS.map(x=><option key={x} value={x}/>)}</datalist>
      <div className="p-5 space-y-4">
        <div className="grid grid-cols-2 gap-3"><Campo label="Ejecutivo"><input list="dl-ejec" value={f.ejecutivo} onChange={e=>set("ejecutivo",e.target.value)} className={inp} placeholder="Nombre…"/></Campo><Campo label="Empresa / Marca"><input list="dl-emp" value={f.empresa} onChange={e=>set("empresa",e.target.value)} className={inp} placeholder="HT / JJ / 3C"/></Campo></div>
        <Campo label="Cliente"><input list="dl-cli" value={f.cliente} onChange={e=>set("cliente",e.target.value)} className={inp} placeholder="Nombre o empresa del cliente…"/></Campo>
        <div className="grid grid-cols-2 gap-3"><Campo label="Folio Venta"><input value={f.folioVenta} onChange={e=>set("folioVenta",e.target.value)} className={inp} placeholder="Ej. V-10245"/></Campo><Campo label="Folio JJ"><input value={f.folioJJ} onChange={e=>set("folioJJ",e.target.value)} className={inp} placeholder="Ej. JJ-8891"/></Campo></div>

        {/* Tipo de cliente */}
        <div><span className="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Tipo de cliente</span>
          <div className="grid grid-cols-2 gap-2">{TIPO_CLIENTE.map(op=>{const a=f.tipoCliente===op;return <button key={op} onClick={()=>setTC(op)} className={`rounded-lg border px-2 py-2 text-sm font-medium ${a?"bg-slate-800 text-white border-slate-800":"border-stone-300 text-slate-600 hover:bg-stone-50"}`}>{op}</button>;})}</div>
          <p className="mt-1 text-xs text-slate-400">Cambia el listado de requisitos del expediente.</p>
        </div>

        <div className="grid grid-cols-2 gap-3"><Campo label="Correo electrónico"><input type="email" value={f.correo} onChange={e=>set("correo",e.target.value)} className={inp} placeholder="cliente@correo.com"/></Campo><Campo label="Teléfono"><input value={f.telefono} onChange={e=>set("telefono",e.target.value)} className={inp} placeholder="871 000 0000"/></Campo></div>

        <div><span className="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Equipo / remolque</span><div className="flex gap-2 mb-1 text-[10px] uppercase tracking-wide text-slate-400 font-semibold"><span className="flex-1">Descripción</span><span className="w-16 text-center">Cant.</span>{f.equipos.length>1 && <span className="w-8"></span>}</div><div className="space-y-2">{f.equipos.map((eq,i)=>(<div key={i} className="flex items-center gap-2"><input value={eq.tipo} onChange={e=>setEq(i,"tipo",e.target.value)} placeholder="Ej. Portacontenedor 40/20" className="flex-1 min-w-0 rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-100"/><input type="number" min="1" value={eq.cantidad} onChange={e=>setEq(i,"cantidad",e.target.value)} className="w-16 shrink-0 text-center rounded-lg border border-stone-300 bg-white px-3 py-2 text-sm outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-100"/>{f.equipos.length>1 && <button onClick={()=>delEq(i)} className="grid h-8 w-8 shrink-0 place-items-center rounded-md text-slate-400 hover:bg-stone-100 hover:text-red-500"><Icon name="x" size={16}/></button>}</div>))}</div><button onClick={addEq} className="mt-2 inline-flex items-center gap-1 text-xs font-semibold text-slate-600 hover:text-slate-900"><Icon name="plus" size={14}/> Agregar equipo</button></div>

        <Campo label="NIV de equipo"><textarea value={f.niv} onChange={e=>set("niv",e.target.value)} rows={2} placeholder="Captura uno o varios NIV (uno por línea o separados por coma)" className={inp}/></Campo>
        <div><span className="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Tipo de venta</span><div className="grid grid-cols-2 gap-2">{TIPOVENTA.map(op=>{const a=f.tipoVenta===op;return <button key={op} onClick={()=>setTV(a?"":op)} className={`rounded-lg border px-2 py-2 text-sm font-medium ${a?"bg-slate-800 text-white border-slate-800":"border-stone-300 text-slate-600 hover:bg-stone-50"}`}>{op}</button>;})}</div>{plazosDisp.length>0 && (<div className="mt-2 rounded-lg bg-stone-50 border border-stone-200 p-2"><span className="mb-1.5 block text-[11px] font-semibold uppercase tracking-wide text-slate-500">Plazo</span><div className="flex flex-wrap gap-1.5">{plazosDisp.map(p=>{const a=f.plazo===p;return <button key={p} onClick={()=>set("plazo",a?"":p)} className={`rounded-full border px-3 py-1 text-xs font-semibold ${a?"bg-amber-500 text-white border-amber-500":"border-stone-300 text-slate-600 hover:bg-white"}`}>{p} meses</button>;})}</div></div>)}</div>

        <div><span className="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Adicionales del equipo</span><div className="flex flex-wrap gap-1.5">{ADICIONALES.map(a=>{const sel=f.adicionales.includes(a);return <button key={a} onClick={()=>toggleAdi(a)} className={`inline-flex items-center gap-1 rounded-full border px-2.5 py-1 text-xs font-medium ${sel?"bg-amber-50 text-amber-800 border-amber-300":"border-stone-300 text-slate-500 hover:bg-stone-50"}`}>{sel && <Icon name="check" size={12}/>}{a}</button>;})}</div></div>

        {/* Bitácora */}
        <div className="rounded-xl border border-slate-200 bg-slate-50 p-3">
          <div className="flex items-center gap-1.5 mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500"><Icon name="history" size={14}/> Registrar interacción</div>
          <div className="grid grid-cols-2 gap-2 mb-2"><input type="date" value={nb.fecha} onChange={e=>setNb({...nb,fecha:e.target.value})} className={inp}/><select value={nb.tipo} onChange={e=>setNb({...nb,tipo:e.target.value})} className={inp}>{TIPOS.map(t=><option key={t}>{t}</option>)}</select></div>
          <div className="grid grid-cols-2 gap-2 mb-2">{CONTACTO.map(op=>{const a=nb.contacto===op;const s=op==="Contestó"?(a?"bg-emerald-600 text-white border-emerald-600":"border-stone-300 text-slate-600 hover:bg-emerald-50"):(a?"bg-red-500 text-white border-red-500":"border-stone-300 text-slate-600 hover:bg-red-50");return <button key={op} onClick={()=>setNb({...nb,contacto:op})} className={`rounded-lg border px-2 py-2 text-sm font-medium ${s}`}>{op}</button>;})}</div>
          <textarea value={nb.resultado} onChange={e=>setNb({...nb,resultado:e.target.value})} rows={2} placeholder="¿Qué pasó en esta interacción? (resultado, qué se pidió, siguiente paso…)" className={inp}/>
          <button onClick={addBit} className="mt-2 inline-flex items-center gap-1 rounded-lg bg-slate-900 px-3 py-1.5 text-xs font-semibold text-white hover:bg-slate-800"><Icon name="plus" size={13}/> Agregar a la bitácora</button>
          {bitOrd.length>0 && (<div className="mt-3 space-y-1.5 border-t border-slate-200 pt-2">{bitOrd.map(be=>(<div key={be.id} className="flex items-start gap-2 rounded-md bg-white border border-stone-200 px-2 py-1.5 text-xs"><TipoTag tipo={be.tipo}/><div className="min-w-0 flex-1"><div className="flex items-center gap-1.5"><span className="font-semibold text-slate-600">{corto(be.fecha)}</span><ContactoTag contacto={be.contacto} compacto/></div>{be.resultado && <p className="text-slate-600">{be.resultado}</p>}</div><button onClick={()=>delBit(be.id)} className="text-slate-300 hover:text-red-500"><Icon name="x" size={13}/></button></div>))}</div>)}
        </div>

        <Campo label="Estatus de la solicitud (marca todas las etapas que apliquen)"><div className="flex flex-wrap gap-1.5">{ESTATUS.map(est=>{const on=(f.estatuses||[]).includes(est);return <button key={est} onClick={()=>toggleEst(est)} className={`rounded-full border px-2.5 py-1 text-xs font-medium ${on?ESTATUS_COLOR[est].chip+" ring-2 ring-offset-1 ring-slate-300":"border-stone-300 text-slate-500 hover:bg-stone-50"}`}>{on?"✓ ":""}{est}</button>;})}</div><span className="mt-1.5 block text-[11px] text-slate-400">En el tablero y los conteos aparece según la etapa más avanzada marcada: <span className="font-semibold text-slate-600">{principal(f.estatuses||[])}</span></span></Campo>

        <div className="rounded-xl border border-stone-200 bg-stone-50 p-3"><div className="flex items-center justify-between mb-2"><div className="flex items-center gap-1.5 text-xs font-semibold uppercase tracking-wide text-slate-500"><Icon name="clip" size={14}/> Requisitos · {f.tipoCliente==="Cliente Recurrente"?"Recurrente":"Nuevo"}</div><span className={`text-xs font-bold mono ${st.completo?"text-emerald-600":"text-indigo-600"}`}>{st.completo?"Completo":`${st.recibido}/${st.aplicables}`}</span></div><p className="text-xs text-slate-400 mb-2">Clic para alternar: <span className="text-slate-500 font-medium">Pendiente → Recibido → No aplica</span> · 📷 escanea con la cámara · 📎 sube archivo o PDF</p><div className="space-y-1.5">{reqListFor(f.tipoCliente).map(k=>{const v=f.requisitos[k]||"pendiente";const s=v==="recibido"?"bg-emerald-600 text-white border-emerald-600":v==="na"?"bg-stone-100 text-slate-400 border-stone-200 line-through":"bg-white border-stone-300 text-slate-600 hover:bg-stone-50";const lista=((f.archivos||{})[k])||[];return (<div key={k} className="rounded-lg border border-stone-200 bg-white p-1.5"><div className="flex items-center gap-1.5"><button onClick={()=>ciclaReq(k)} className={`flex flex-1 min-w-0 items-center gap-1.5 rounded-md border px-2.5 py-1.5 text-xs font-medium text-left ${s}`}><span className="shrink-0">{v==="recibido"?<Icon name="check" size={13}/>:v==="na"?<Icon name="x" size={12}/>:<span className="inline-block h-3 w-3 rounded-full border border-current opacity-40"></span>}</span><span className="truncate">{k}</span>{lista.length>0&&<span className="ml-auto shrink-0 rounded-full bg-black/10 px-1.5 py-0.5 text-[10px] font-bold">{lista.length}</span>}</button><label title="Escanear con la cámara" className="cursor-pointer shrink-0 rounded-md border border-emerald-300 bg-emerald-50 px-2 py-1.5 text-xs font-semibold text-emerald-700 hover:bg-emerald-100">📷<input type="file" accept="image/*" capture="environment" className="hidden" onChange={e=>{const fl=e.target.files[0];if(fl)subirArchivo(k,fl);e.target.value="";}}/></label><label title="Subir archivo o PDF" className="cursor-pointer shrink-0 rounded-md border border-stone-300 bg-white px-2 py-1.5 text-xs font-semibold text-slate-600 hover:bg-stone-50">📎<input type="file" accept="image/*,application/pdf" className="hidden" onChange={e=>{const fl=e.target.files[0];if(fl)subirArchivo(k,fl);e.target.value="";}}/></label></div>{subiendo===k && <p className="mt-1 text-[11px] font-medium text-sky-600">Subiendo…</p>}{lista.length>0 && <div className="mt-1.5 flex flex-wrap gap-1.5">{lista.map((a,i)=>(<div key={i} className="relative"><a href={a.url} target="_blank" rel="noopener"><img src={`https://drive.google.com/thumbnail?id=${a.id}&sz=w120`} alt={a.nombre} className="h-12 w-12 rounded border border-stone-200 object-cover bg-stone-50"/></a><button onClick={()=>quitarArchivo(k,i)} className="absolute -right-1 -top-1 grid h-4 w-4 place-items-center rounded-full border border-stone-200 bg-white text-slate-400 shadow hover:text-red-500"><Icon name="x" size={9}/></button></div>))}</div>}</div>);})}</div></div>

        <Campo label="Pendiente actual (nota)"><textarea value={f.queFalta} onChange={e=>set("queFalta",e.target.value)} rows={2} placeholder="Algo fuera del expediente (ej. cliente confirma plazo)…" className={inp}/></Campo>
        <div className="rounded-xl border border-stone-200 bg-stone-50 p-3 space-y-3"><div className="flex items-center gap-1.5 text-xs font-semibold uppercase tracking-wide text-slate-500"><Icon name="alarm" size={14}/> Próximo compromiso de llamada</div><input type="datetime-local" value={f.compromiso} onChange={e=>set("compromiso",e.target.value)} className={inp}/>{f.compromiso && <label className="flex items-center gap-2 text-sm text-slate-600"><input type="checkbox" checked={f.compromisoCumplido} onChange={e=>set("compromisoCumplido",e.target.checked)} className="h-4 w-4"/> Ya realicé esta llamada</label>}<p className="text-xs text-slate-400">Con fecha y hora, el cliente se marca en rojo (vencida) o ámbar (por marcar pronto).</p></div>
        <Campo label="Fecha de entrega"><input type="date" value={f.entregaProgramada} onChange={e=>set("entregaProgramada",e.target.value)} className={inp}/></Campo>
        <Campo label="Notas (opcional)"><textarea value={f.notas} onChange={e=>set("notas",e.target.value)} rows={2} className={inp}/></Campo>
      </div>
      <div className="sticky bottom-0 flex justify-end gap-2 border-t border-stone-200 bg-white px-5 py-3"><button onClick={onClose} className="rounded-lg px-3.5 py-2 text-sm font-semibold text-slate-600 hover:bg-stone-100">Cancelar</button><button onClick={()=>valido&&guardarLimpio()} disabled={!valido} className="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 disabled:opacity-40">{inicial?"Guardar cambios":"Crear cliente"}</button></div>
    </div>
  </div>);
}

/* ---------- Piezas ---------- */
function Campo({label,children}){return <label className="block"><span className="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">{label}</span>{children}</label>;}
function Badges({r}){const es=(r.estatuses&&r.estatuses.length)?r.estatuses:[r.estatus];const ord=es.slice().sort((a,b)=>estIdx(a)-estIdx(b));return <div className="flex flex-wrap gap-1 justify-end max-w-[190px]">{ord.map(e=>{const c=ESTATUS_COLOR[e]||ESTATUS_COLOR[ESTATUS[0]];const p=e===r.estatus&&ord.length>1;return <span key={e} className={`inline-flex items-center rounded-full border px-2 py-0.5 text-[11px] font-medium whitespace-nowrap ${c.chip} ${p?"ring-1 ring-slate-400":""}`}>{e}</span>;})}</div>;}
function Badge({estatus}){const c=ESTATUS_COLOR[estatus]||ESTATUS_COLOR["Nueva"];return <span className={`inline-flex items-center rounded-full border px-2 py-0.5 text-xs font-medium whitespace-nowrap ${c.chip}`}>{estatus}</span>;}
function ContactoTag({contacto,compacto,inline}){const co=contacto==="Contestó";const cls=co?"text-emerald-600":"text-red-500";const dot=co?"bg-emerald-500":"bg-red-500";if(inline)return <span className={`font-semibold ${cls}`}>{contacto}</span>;return <span className={`inline-flex items-center gap-1 text-xs font-medium ${cls}`}><span className={`h-1.5 w-1.5 rounded-full ${dot}`}></span>{!compacto&&contacto}</span>;}
function TableroEtapas({counts,total,activo,onPick}){
  return (
    <div className="mb-5 rounded-xl border border-stone-200 bg-white p-3">
      <div className="flex items-center justify-between mb-2"><h3 className="text-xs font-bold uppercase tracking-wide text-slate-500">Clientes por etapa</h3><span className="text-xs text-slate-400">Total: <span className="mono font-bold text-slate-700">{total}</span></span></div>
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-2">
        {counts.map(({est,n})=>{const c=ESTATUS_COLOR[est];const on=activo===est;return (
          <button key={est} onClick={()=>onPick(est)} className={`rounded-lg border px-2.5 py-2 text-left transition-all ${on?"border-slate-400 ring-2 ring-slate-300 bg-stone-50":"border-stone-200 hover:bg-stone-50"} ${n===0?"opacity-45":""}`}>
            <div className="flex items-center gap-1.5"><span className={`h-2.5 w-2.5 rounded-full ${c.spine}`}></span><span className="text-lg font-bold mono text-slate-900 leading-none">{n}</span></div>
            <p className="mt-1 text-[11px] font-medium text-slate-500 leading-tight">{est}</p>
          </button>);})}
      </div>
    </div>
  );
}
function Kpi({icon,label,valor,tono}){return <div className="rounded-xl border border-stone-200 bg-white px-4 py-3"><div className="flex items-center gap-1.5 text-slate-400"><Icon name={icon} size={16}/><span className="text-xs font-medium text-slate-500">{label}</span></div><p className={`mt-1 text-2xl font-bold mono ${tono}`}>{valor}</p></div>;}
function Tab({activo,onClick,children}){return <button onClick={onClick} className={`rounded-md px-3 py-1.5 text-sm font-semibold ${activo?"bg-slate-900 text-white":"text-slate-600 hover:bg-stone-100"}`}>{children}</button>;}
function Select({value,onChange,options,prefijo}){return <select value={value} onChange={e=>onChange(e.target.value)} className="rounded-lg border border-stone-300 bg-white px-2.5 py-1.5 text-sm text-slate-700 outline-none focus:border-slate-400 max-w-[180px]">{options.map(o=><option key={o} value={o}>{o==="Todos"?`${prefijo}: Todos`:o}</option>)}</select>;}
function Vacio({texto}){return <div className="rounded-xl border border-dashed border-stone-300 bg-white py-12 text-center"><Icon name="calendar" size={28} className="mx-auto text-stone-300"/><p className="mt-2 text-sm text-slate-500 max-w-xs mx-auto">{texto}</p></div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
